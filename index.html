<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Un bouquet pour toi</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="bouquet-view" aria-labelledby="page-title">
        <div class="intro">
          <p class="kicker">Joyeux anniversaire Sarah</p>
          <h1 id="page-title">
            <span class="title-line">Un bouquet</span>
            <span class="title-line">rien que pour toi</span>
          </h1>
          <p class="dedication">Parce que tu mérites bien tous les bouquets du monde.</p>
          <p class="dedication">Vu que je ne saurais jamais assez te dire je t'aime, je t'ai composé assez de bouquets pour te le montrer</p>
</div>

        <div class="bouquet-stage" aria-label="Bouquet genere">
          <div class="stage-glow"></div>
          <div id="stemLayer" class="stem-layer"></div>
          <div id="flowerLayer" class="flower-layer"></div>
          <div class="wrap">
            <div class="wrap-left"></div>
            <div class="wrap-right"></div>
            <div class="ribbon"></div>
          </div>
        </div>
      </section>

      <aside class="bouquet-panel" aria-label="Details du bouquet">
        <div class="panel-topline">
          <span id="paletteName">Palette</span>
          <span id="bouquetNumber">#0000</span>
        </div>

        <div>
          <h2 id="bouquetTitle">Bouquet</h2>
          <p id="bouquetMood" class="mood"></p>
        </div>

        <div id="swatches" class="swatches" aria-label="Couleurs du bouquet"></div>

        <div>
          <h3 id="selectionTitle">Fleurs choisies</h3>
          <ul id="flowerList" class="flower-list"></ul>
        </div>
        <div class="bouquet-actions">
          <button id="regenerate" class="regenerate" type="button" aria-label="Generer un nouveau bouquet harmonieux">
            <span aria-hidden="true">*</span>
            Nouveau bouquet
          </button>
          <button id="randomize" class="regenerate secondary" type="button" aria-label="Generer un bouquet aleatoire sans palette">
            <span aria-hidden="true">?</span>
            Bouquet surprise
          </button>
          <button id="groguize" class="regenerate grogu" type="button" aria-label="Generer un bouquet Grogu">
            <span aria-hidden="true">G</span>
            Bouquet Grogu
          </button>
          <button id="latest" class="regenerate latest" type="button" aria-label="Afficher le dernier bouquet ajoute">
            <span aria-hidden="true">+</span>
            Dernier bouquet
          </button>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>


  </body>
</html>
